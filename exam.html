<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEET PG CBT - Exam</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="topbar">
    <div>NEET PG CBT</div>
    <div>
      Time Left: <b id="timeLeft">180:00</b>
      &nbsp; | &nbsp;
      Violations: <b id="vio">0</b>
    </div>
  </header>

  <div class="layout">
    <main class="main">
      <div class="qbox">
        <div class="student-info" id="studentInfo"></div>

        <div id="qTitle" class="qtitle"></div>
        <div id="qText" class="qtext"></div>

        <img id="qImg" class="qimg" style="display:none;" alt="Question image" />

        <div id="opts" class="opts"></div>

        <div class="actions">
          <button id="prevBtn" onclick="prevQuestion()">Previous</button>
          <button onclick="clearResponse()">Clear Response</button>
          <button id="markBtn" onclick="markForReview()">Mark for Review</button>
          <button onclick="nextQuestion()">Next</button>
        </div>

        <div class="actions">
          <button class="danger" onclick="confirmSubmit()">Submit</button>
        </div>

        <div class="warning" id="warning"></div>
      </div>
    </main>

    <aside class="palette">
      <h3>Questions</h3>

      <div id="pal"></div>

      <div class="legend">
        <div><span class="dot unanswered"></span> Unanswered</div>
        <div><span class="dot answered"></span> Answered</div>
        <div><span class="dot review"></span> Marked</div>
        <div><span class="dot ansreview"></span> Answered + Marked</div>
      </div>
    </aside>
  </div>

  <div id="imgModal" class="img-modal">
    <div class="img-modal-top">
      <button onclick="openImageFullscreen()">⛶ Fullscreen</button>
      <button class="danger" onclick="closeImageModal()">✕ Close</button>
    </div>

    <div class="img-modal-body">
      <img id="imgModalPic" alt="Question image enlarged" />
    </div>
  </div>

  <script src="config.js"></script>
  <script src="questions.js"></script>

  <script>
    const API_URL = window.API_URL || window.SCRIPT_URL || "";

    const EXAM_DURATION_SECONDS = Number(
      window.EXAM_DURATION_SECONDS ||
      (window.EXAM_DURATION_MIN ? window.EXAM_DURATION_MIN * 60 : 180 * 60)
    );

    const MARKS_CORRECT = Number(window.MARKS_CORRECT ?? 4);
    const MARKS_WRONG = Number(window.MARKS_WRONG ?? -1);

    let currentIndex = 0;
    let userAnswers = {};
    let markedQuestions = {};
    let startedAt = new Date();
    let submitted = false;
    let violationCount = 0;
    let timerInterval = null;

    function safeParse(value) {
      try {
        return JSON.parse(value);
      } catch {
        return null;
      }
    }

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    const candidate =
      safeParse(localStorage.getItem("neet_candidate") || "") ||
      {
        token: localStorage.getItem("token") || "",
        candidateId: localStorage.getItem("candidateId") || "",
        name: localStorage.getItem("candidateName") || "",
        phone: localStorage.getItem("candidatePhone") || "",
        email: localStorage.getItem("candidateEmail") || ""
      };

    if (!candidate || !candidate.token || !candidate.candidateId) {
      alert("Please login first");
      window.location.replace("login.html");
      throw new Error("Login required");
    }

    if (localStorage.getItem("neet_submitted") === "yes") {
      window.location.replace("result.html");
      throw new Error("Already submitted");
    }

    if (!API_URL) {
      alert("API_URL missing. Please check config.js");
      throw new Error("API_URL missing");
    }

    if (!window.questions || !Array.isArray(window.questions) || window.questions.length === 0) {
      alert("Questions not loaded. Please check questions.js");
      throw new Error("Questions not loaded");
    }

    const candidateId = candidate.candidateId;
    const token = candidate.token;
    const candidateName = candidate.name || "";
    const candidatePhone = candidate.phone || "";
    const candidateEmail = candidate.email || "";

    const stateKey = "neet_exam_state_" + candidateId;
    const questionOrderKey = "neet_question_order_" + candidateId;

    document.getElementById("studentInfo").innerHTML =
      "<b>Name:</b> " + escapeHtml(candidateName) +
      " | <b>ID:</b> " + escapeHtml(candidateId) +
      " | <b>Email:</b> " + escapeHtml(candidateEmail);

    function shuffleArray(array) {
      const copy = [...array];

      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }

      return copy;
    }

    function applyStableQuestionOrder() {
      const allQuestions = [...window.questions];
      const savedOrder = safeParse(localStorage.getItem(questionOrderKey) || "");

      if (Array.isArray(savedOrder) && savedOrder.length === allQuestions.length) {
        const questionMap = {};

        allQuestions.forEach(function(q) {
          questionMap[String(q.id)] = q;
        });

        const orderedQuestions = savedOrder
          .map(function(id) {
            return questionMap[String(id)];
          })
          .filter(Boolean);

        if (orderedQuestions.length === allQuestions.length) {
          window.questions = orderedQuestions;
          return;
        }
      }

      window.questions = shuffleArray(allQuestions);

      localStorage.setItem(
        questionOrderKey,
        JSON.stringify(window.questions.map(function(q) {
          return q.id;
        }))
      );
    }

    function saveState() {
      localStorage.setItem(stateKey, JSON.stringify({
        currentIndex: currentIndex,
        userAnswers: userAnswers,
        markedQuestions: markedQuestions,
        startedAt: startedAt.toISOString(),
        violationCount: violationCount
      }));
    }

    function loadState() {
      const saved = safeParse(localStorage.getItem(stateKey) || "");
      if (!saved) return;

      if (typeof saved.currentIndex === "number") {
        currentIndex = saved.currentIndex;
      }

      if (saved.userAnswers && typeof saved.userAnswers === "object") {
        userAnswers = saved.userAnswers;
      }

      if (saved.markedQuestions && typeof saved.markedQuestions === "object") {
        markedQuestions = saved.markedQuestions;
      }

      if (saved.startedAt) {
        const savedStartedAt = new Date(saved.startedAt);

        if (!isNaN(savedStartedAt.getTime())) {
          startedAt = savedStartedAt;
        }
      }

      if (typeof saved.violationCount === "number") {
        violationCount = saved.violationCount;
      }

      document.getElementById("vio").textContent = violationCount;
    }

    function isAnswered(q) {
      return (
        userAnswers[q.id] !== undefined &&
        userAnswers[q.id] !== null &&
        userAnswers[q.id] !== ""
      );
    }

    function buildAnswerKeyFromQuestions() {
      const answerKey = {};

      window.questions.forEach(function(q) {
        if (q && q.id !== undefined && q.answerIndex !== undefined) {
          answerKey[String(q.id)] = Number(q.answerIndex);
        }
      });

      return answerKey;
    }

    function calculateLocalResult() {
      let correct = 0;
      let wrong = 0;
      let unattempted = 0;

      window.questions.forEach(function(q) {
        const ans = userAnswers[q.id];

        if (ans === undefined || ans === null || ans === "") {
          unattempted++;
        } else if (Number(ans) === Number(q.answerIndex)) {
          correct++;
        } else {
          wrong++;
        }
      });

      const totalQuestions = window.questions.length;
      const score = (correct * MARKS_CORRECT) + (wrong * MARKS_WRONG);

      return {
        score: score,
        correct: correct,
        wrong: wrong,
        unattempted: unattempted,
        totalQuestions: totalQuestions,
        violations: violationCount,
        violationCount: violationCount
      };
    }

    function setExamButtonsDisabled(disabled) {
      document.querySelectorAll("button").forEach(function(btn) {
        btn.disabled = disabled;
      });
    }

    function renderQuestion() {
      const q = window.questions[currentIndex];

      document.getElementById("qTitle").textContent =
        "Question " + (currentIndex + 1) + " of " + window.questions.length;

      document.getElementById("qText").textContent = q.question || "";

      const img = document.getElementById("qImg");

      if (q.image && String(q.image).trim() !== "") {
        img.src = q.image;
        img.style.display = "block";
      } else {
        img.style.display = "none";
        img.removeAttribute("src");
      }

      const opts = document.getElementById("opts");
      opts.innerHTML = "";

      (q.options || []).forEach(function(option, index) {
        const div = document.createElement("div");
        div.className = "opt";

        if (Number(userAnswers[q.id]) === index) {
          div.classList.add("selected");
        }

        const radio = document.createElement("span");
        radio.className = "radio-circle";

        const text = document.createElement("span");
        text.textContent = option;

        div.appendChild(radio);
        div.appendChild(text);

        div.onclick = function() {
          if (submitted) return;

          userAnswers[q.id] = index;

          delete markedQuestions[q.id];

          saveState();
          renderQuestion();
        };

        opts.appendChild(div);
      });

      document.getElementById("prevBtn").disabled = currentIndex === 0;

      updateMarkButton();
      renderPalette();
      saveState();
    }

    function updateMarkButton() {
      const q = window.questions[currentIndex];
      const markBtn = document.getElementById("markBtn");

      if (!markBtn) return;

      if (markedQuestions[q.id] === true) {
        markBtn.textContent = "Remove Mark";
      } else {
        markBtn.textContent = "Mark for Review";
      }
    }

    function renderPalette() {
      const pal = document.getElementById("pal");
      pal.innerHTML = "";

      window.questions.forEach(function(q, index) {
        const btn = document.createElement("button");
        btn.textContent = index + 1;

        const answered = isAnswered(q);
        const marked = markedQuestions[q.id] === true;

        if (answered && marked) {
          btn.className = "ansreview";
        } else if (answered) {
          btn.className = "answered";
        } else if (marked) {
          btn.className = "review";
        } else {
          btn.className = "unanswered";
        }

        if (index === currentIndex) {
          btn.classList.add("current");
        }

        btn.onclick = function() {
          if (submitted) return;

          currentIndex = index;
          renderQuestion();
        };

        pal.appendChild(btn);
      });
    }

    function nextQuestion() {
      if (submitted) return;

      if (currentIndex < window.questions.length - 1) {
        currentIndex++;
        renderQuestion();
      }
    }

    function prevQuestion() {
      if (submitted) return;

      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    }

    function clearResponse() {
      if (submitted) return;

      const q = window.questions[currentIndex];

      delete userAnswers[q.id];

      saveState();
      renderQuestion();
    }

    function markForReview() {
      if (submitted) return;

      const q = window.questions[currentIndex];

      if (markedQuestions[q.id] === true) {
        delete markedQuestions[q.id];
      } else {
        markedQuestions[q.id] = true;
      }

      saveState();
      renderQuestion();
    }

    function confirmSubmit() {
      if (submitted) return;

      const totalQuestions = window.questions.length;
      const answeredCount = window.questions.filter(isAnswered).length;
      const unansweredCount = totalQuestions - answeredCount;
      const markedCount = Object.values(markedQuestions).filter(Boolean).length;

      const ok = confirm(
        "Are you sure you want to submit the exam?\n\n" +
        "Total Questions: " + totalQuestions + "\n" +
        "Answered: " + answeredCount + "\n" +
        "Unanswered: " + unansweredCount + "\n" +
        "Marked for Review: " + markedCount
      );

      if (ok) {
        submitExam("manual", false);
      }
    }

    function sendSubmissionInBackground(submissionBody) {
      localStorage.setItem("neet_pending_submission", submissionBody);

      fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: submissionBody,
        cache: "no-store",
        keepalive: true
      })
        .then(function(res) {
          return res.text();
        })
        .then(function(raw) {
          const serverResult = safeParse(raw);

          if (serverResult && (serverResult.ok === true || serverResult.status === "success")) {
            localStorage.setItem("neet_result", JSON.stringify(serverResult));
            localStorage.removeItem("neet_pending_submission");
          }
        })
        .catch(function(error) {
          console.error("Background submission failed:", error);
        });
    }

    function submitExam(reason, isAuto) {
      if (submitted) return;

      submitted = true;
      clearInterval(timerInterval);
      setExamButtonsDisabled(true);

      const endedAt = new Date();
      const timeTakenSec = Math.floor((endedAt - startedAt) / 1000);

      const qOrder = window.questions.map(function(q) {
        return q.id;
      });

      const answerKey = buildAnswerKeyFromQuestions();
      const localResult = calculateLocalResult();

      const payload = {
        name: candidateName,
        phone: candidatePhone,
        email: candidateEmail,
        answers: userAnswers,
        marked: markedQuestions,
        qOrder: qOrder,
        answerKey: answerKey,
        timeTakenSec: timeTakenSec,
        violations: violationCount,
        userAgent: navigator.userAgent,
        reason: reason,
        isAuto: isAuto,
        startedAt: formatLocalDate(startedAt),
        endedAt: formatLocalDate(endedAt)
      };

      const localResultForStorage = {
        ok: true,
        status: "success",
        localDisplayed: true,
        score: localResult.score,
        correct: localResult.correct,
        wrong: localResult.wrong,
        unattempted: localResult.unattempted,
        totalQuestions: localResult.totalQuestions,
        violations: localResult.violations,
        violationCount: localResult.violationCount,
        candidateId: candidateId,
        name: candidateName,
        phone: candidatePhone,
        email: candidateEmail,
        qOrder: qOrder,
        answerKey: answerKey,
        timeTakenSec: timeTakenSec,
        reason: reason,
        isAuto: isAuto,
        startedAtIST: formatLocalDate(startedAt),
        endedAtIST: formatLocalDate(endedAt)
      };

      const submissionBody = JSON.stringify({
        action: "submit",
        candidateId: candidateId,
        token: token,

        payload: payload,

        responses: userAnswers,
        markedQuestions: markedQuestions,
        qOrder: qOrder,
        answerKey: answerKey,

        timeTakenSec: timeTakenSec,
        violationCount: violationCount,
        userAgent: navigator.userAgent,
        reason: reason,
        isAuto: isAuto,
        startedAtIST: formatLocalDate(startedAt),
        endedAtIST: formatLocalDate(endedAt)
      });

      localStorage.setItem("neet_submitted", "yes");
      localStorage.setItem("neet_result", JSON.stringify(localResultForStorage));
      localStorage.removeItem(stateKey);

      sendSubmissionInBackground(submissionBody);

      alert(
        "Exam submitted successfully!\n\n" +
        "Score: " + localResult.score + "\n" +
        "Correct: " + localResult.correct + "\n" +
        "Wrong: " + localResult.wrong + "\n" +
        "Unattempted: " + localResult.unattempted + "\n" +
        "Total Questions: " + localResult.totalQuestions + "\n" +
        "Violations: " + localResult.violations
      );

      window.location.replace("result.html");
    }

    function startTimer() {
      clearInterval(timerInterval);

      function updateTimer() {
        if (submitted) return;

        const now = new Date();
        const elapsed = Math.floor((now - startedAt) / 1000);
        const remaining = Math.max(EXAM_DURATION_SECONDS - elapsed, 0);

        const min = Math.floor(remaining / 60);
        const sec = remaining % 60;

        document.getElementById("timeLeft").textContent =
          min + ":" + String(sec).padStart(2, "0");

        if (remaining <= 0) {
          clearInterval(timerInterval);
          submitExam("time_over", true);
        }
      }

      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
    }

    function sendViolation(type, details) {
      if (!candidateId || !token || submitted) return;

      violationCount++;

      document.getElementById("vio").textContent = violationCount;

      saveState();

      fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
          action: "violation",
          candidateId: candidateId,
          token: token,
          type: type,
          details: details || ""
        }),
        cache: "no-store",
        keepalive: true
      }).catch(function() {});
    }

    document.addEventListener("visibilitychange", function() {
      if (document.hidden) {
        sendViolation("Tab switched", "Student switched tab or minimized browser");
      }
    });

    document.addEventListener("fullscreenchange", function() {
      if (!document.fullscreenElement) {
        sendViolation("Fullscreen exited", "Student exited fullscreen mode");
      }
    });

    document.addEventListener("contextmenu", function(e) {
      e.preventDefault();
      sendViolation("Right click attempted", "Student attempted right click");
    });

    document.addEventListener("copy", function(e) {
      e.preventDefault();
      sendViolation("Copy attempted", "Student attempted copy");
    });

    function formatLocalDate(date) {
      return date.toLocaleString("en-IN", {
        timeZone: "Asia/Kolkata",
        hour12: false
      });
    }

    const qImg = document.getElementById("qImg");
    const imgModal = document.getElementById("imgModal");
    const imgModalPic = document.getElementById("imgModalPic");

    qImg.onclick = function() {
      if (!qImg.src) return;

      imgModalPic.src = qImg.src;
      imgModal.classList.add("show");
    };

    function closeImageModal() {
      imgModal.classList.remove("show");
      imgModalPic.removeAttribute("src");
    }

    function openImageFullscreen() {
      if (imgModal.requestFullscreen) {
        imgModal.requestFullscreen();
      }
    }

    imgModal.onclick = function(e) {
      if (e.target === imgModal) {
        closeImageModal();
      }
    };

    applyStableQuestionOrder();
    loadState();
    renderQuestion();
    startTimer();
  </script>
</body>
</html>
